    <style>
        :root {
            --bg-primary: #0a0a0f;

            --bg-card: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.04);
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0c0;

            --accent-gold-light: #e0c878;

            --shadow-deep: 0 8px 40px rgba(0,0,0,0.5);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --font-display: 'Playfair Display', 'Noto Serif KR', serif;
            --font-body: 'Inter', 'Noto Sans KR', sans-serif;
            --transition-smooth: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-bounce: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.7;

            -moz-osx-font-smoothing: grayscale;

        /* 시네마틱 그라데이션 오버레이 (히어로 배경) */
        .hero-background {
            position: relative;
            width: 100%;
            min-height: 520px;
            background: var(--gradient-midnight);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-background::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 40%, rgba(200,164,90,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(212,138,154,0.06) 0%, transparent 55%),
                        radial-gradient(ellipse at 50% 80%, rgba(180,160,200,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .hero-background::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.003) 2px,
                rgba(255,255,255,0.003) 4px
            );
            animation: slowDrift 40s linear infinite;
            z-index: 0;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(3%, 2%); }
        }

        /* 네비게이션 */
        nav {

            left: 0;

            background: rgba(10,10,20,0.75);

            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            transition: var(--transition-smooth);
            padding: 0 24px;

        .logo:hover {

            text-shadow: 0 0 30px rgba(200,164,90,0.25);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;

            font-weight: 500;
            letter-spacing: 0.02em;
            transition: var(--transition-smooth);
            position: relative;
            padding: 6px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: var(--transition-bounce);
            border-radius: 2px;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--accent-gold);
            font-weight: 600;
        }

        .nav-links a.active::after {
            width: 100%;
        }

        .nav-cta {

            font-weight: 700 !important;

        .hamburger {

            border-radius: 2px;
            transition: var(--transition-smooth);
            transform-origin: center;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .hamburger.active span:nth-child(3) {

            color: var(--accent-gold-light);
        }

        /* 메인 컨텐츠 */
